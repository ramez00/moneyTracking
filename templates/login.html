{% extends "base.html" %} {% block title %}{{ _('Sign in') }} — Spendly{%
endblock %} {% block content %}

<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">{{ _('Welcome back') }}</h1>
      <p class="auth-subtitle">{{ _('Sign in to your Spendly account') }}</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="email">{{ _('Email address') }}</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="nitish@example.com"
            required
            autofocus
          />
        </div>
        <div class="form-group">
          <label for="password">{{ _('Password') }}</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="{{ _('Your password') }}"
            required
          />
        </div>
        <button type="submit" class="btn-submit">{{ _('Sign in') }}</button>
      </form>
    </div>

    <p class="auth-switch">
      {{ _('Don\'t have an account?') }}
      <a href="{{ url_for('register') }}">{{ _('Create one free') }}</a>
    </p>
  </div>
</section>

{% endblock %}
