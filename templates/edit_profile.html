{% extends "base.html" %} {% block title %}{{ _('Edit profile') }} — Spendly{%
endblock %} {% block content %}

<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">{{ _('Edit your profile') }}</h1>
      <p class="auth-subtitle">{{ _('Update your name, email, or password') }}</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('edit_profile') }}">
        <div class="form-group">
          <label for="name">{{ _('Full name') }}</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-input"
            value="{{ form.get('name', '') }}"
            required
            autofocus
          />
        </div>
        <div class="form-group">
          <label for="email">{{ _('Email address') }}</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            value="{{ form.get('email', '') }}"
            required
          />
        </div>
        <div class="form-group">
          <label for="current_password">{{ _('Current password') }}</label>
          <input
            type="password"
            id="current_password"
            name="current_password"
            class="form-input"
            placeholder="{{ _('Required to save any change') }}"
            required
          />
        </div>
        <div class="form-group">
          <label for="new_password">{{ _('New password (optional)') }}</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            class="form-input"
            placeholder="{{ _('Leave blank to keep your current password') }}"
          />
        </div>
        <div class="form-group">
          <label for="confirm_password">{{ _('Confirm new password') }}</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            class="form-input"
            placeholder="{{ _('Re-enter your new password') }}"
          />
        </div>
        <button type="submit" class="btn-submit">
          {{ _('Save changes') }}
        </button>
      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('profile') }}">{{ _('Back to profile') }}</a>
    </p>
  </div>
</section>

{% endblock %}
